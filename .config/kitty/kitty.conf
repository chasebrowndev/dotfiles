# ── Font ────────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
disable_ligatures never

# ── Cursor ───────────────────────────────────────────────────────────────────────
cursor                #ff0000
cursor_text_color     #0d0d0d
cursor_shape          beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5

# ── Colors ───────────────────────────────────────────────────────────────────────
background            #000000
foreground            #e0e0e0
selection_background  #3d0000
selection_foreground  #ff6666

# black
color0  #0d0d0d
color8  #2a2a2a

# red — primary accent
color1  #cc0000
color9  #ff0033

# green — muted
color2  #1a4d00
color10 #2d8000

# yellow — muted amber
color3  #7a4800
color11 #cc7700

# blue — muted
color4  #00194d
color12 #0033cc

# magenta — red-adjacent
color5  #660033
color13 #cc0066

# cyan — muted
color6  #003344
color14 #005f87

# white
color7  #b0b0b0
color15 #e0e0e0

# ── Window ───────────────────────────────────────────────────────────────────────
background_opacity        0.95
window_padding_width      8
window_border_width       1
active_border_color       #ff0000
inactive_border_color     #1a1a1a
draw_minimal_borders      no

# ── Tabs ─────────────────────────────────────────────────────────────────────────
tab_bar_style             powerline
tab_powerline_style       angled
active_tab_foreground     #0d0d0d
active_tab_background     #cc0000
active_tab_font_style     bold
inactive_tab_foreground   #666666
inactive_tab_background   #0d0d0d
tab_bar_background        #0d0d0d

# ── Bell ─────────────────────────────────────────────────────────────────────────
enable_audio_bell         no
visual_bell_duration      0.0

# ── Misc ─────────────────────────────────────────────────────────────────────────
scrollback_lines          10000
copy_on_select            yes
strip_trailing_spaces     smart
